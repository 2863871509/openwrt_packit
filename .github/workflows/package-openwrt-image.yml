name: Package OpenWrt firmware image

on:
  repository_dispatch:
  workflow_dispatch:
    inputs:
      openwrt_soc:
        description: "Select the target device board."
        required: false
        default: "s905d"
        type: choice
        options:
          - s905d
      openwrt_ip:
        description: "Set the default IP address."
        required: false
        default: "192.168.1.2"
      kernel_repo:
        description: "Set the kernel download repository."
        required: false
        default: "ophub/kernel"
        type: choice
        options:
          - breakingbadboy/OpenWrt
          - ophub/kernel
      openwrt_kernel:
        description: "Select the kernel version to use."
        required: false
        default: "6.6.y"
        type: choice
        options:
          - 6.6.y
      auto_kernel:
        description: "Auto use the latest kernel."
        required: false
        default: true
        type: boolean
      openwrt_rootfs:
        description: "Set the tag keyword for OpenWrt."
        required: false
        default: "OpenWrt_armv8_rootfs"
      script_diy_path:
        description: "Set the path for custom DIY scripts."
        required: false
        default: ""
      openwrt_storage:
        description: "Select release storage type."
        required: false
        default: "save"
        type: choice
        options:
          - save
          - temp
      builder_name:
        description: "Set the builder signature."
        required: false
        default: "ophub"
        type: choice
        options:
          - ophub
          - angel
          - yourname

env:
  TZ: Etc/UTC

jobs:
  build:
    runs-on: ubuntu-24.04
    if: ${{ github.event.repository.owner.id == github.event.sender.id }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Initialize build environment
        id: init
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          docker rmi -f $(docker images -q) 2>/dev/null || true
          [[ -n "${AGENT_TOOLSDIRECTORY}" ]] && sudo rm -rf "${AGENT_TOOLSDIRECTORY}"
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android 2>/dev/null
          sudo swapoff -a
          sudo rm -f /swapfile /mnt/swapfile
          sudo -E apt-get -y update
          sudo -E apt-get -y purge azure-cli ghc* zulu* llvm* firefox google* dotnet* powershell openjdk* mongodb* moby* || true
          sudo -E apt-get -y install $(curl -fsSL https://ophub.org/ubuntu2404-make-openwrt-depends)
          sudo -E systemctl daemon-reload
          #sudo -E apt-get -y full-upgrade
          sudo -E apt-get -y autoremove --purge
          sudo -E apt-get clean
          sudo sed -i '/NVM_DIR/d;/skel/d' /root/{.bashrc,.profile}
          sudo rm -rf ~/{.cargo,.dotnet,.rustup}
          sudo -E timedatectl set-timezone "${TZ:-Etc/UTC}"
          sudo -E ntpdate ntp.ubuntu.com 0.pool.ntp.org || true
          sudo -E timedatectl set-ntp true
          date -u
          timedatectl status || true
          echo "status=success" >> ${GITHUB_OUTPUT}

      - name: Create LVM virtual disk
        run: |
          mnt_size=$(expr $(df -h /mnt | tail -1 | awk '{print $4}' | sed 's/[[:alpha:]]//g' | sed 's/\..*//') - 1)
          root_size=$(expr $(df -h / | tail -1 | awk '{print $4}' | sed 's/[[:alpha:]]//g' | sed 's/\..*//') - 4)
          sudo truncate -s "${mnt_size}"G /mnt/mnt.img
          sudo truncate -s "${root_size}"G /root.img
          sudo losetup /dev/loop6 /mnt/mnt.img
          sudo losetup /dev/loop7 /root.img
          sudo pvcreate /dev/loop6
          sudo pvcreate /dev/loop7
          sudo vgcreate github /dev/loop6 /dev/loop7
          sudo lvcreate -n runner -l 100%FREE github
          sudo mkfs.xfs -f -i sparse=0 -b size=4096 /dev/github/runner
          sudo mkdir -p /builder
          sudo mount /dev/github/runner /builder
          sudo chown -R runner:runner /builder
          df -Th
          echo "status=success" >> ${GITHUB_OUTPUT}

      - name: Download OpenWrt rootfs
        id: download
        working-directory: /builder
        if: ${{ steps.init.outputs.status == 'success' && !cancelled() }}
        run: |
          # Set the OpenWrt rootfs download repository (change to your own if needed)
          down_rootfs_repo="ophub/flippy-openwrt-actions"

          # Fetch the latest rootfs download URL from the release API
          latest_version=$(curl -s \
                -H "Accept: application/vnd.github+json" \
                -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
                https://api.github.com/repos/${down_rootfs_repo}/releases?per_page=20 | \
                jq -r --arg RTK "${{ inputs.openwrt_rootfs }}" \
                --arg BOARD "-rootfs.tar.gz" \
                '[.[] | select(.tag_name | contains($RTK))] |
                map(.assets[] | select(.browser_download_url | endswith($BOARD))) |
                sort_by(.updated_at) |
                reverse |
                .[0] |
                {data: .updated_at, url: .browser_download_url}')

          [[ -z "${latest_version}" || "${latest_version}" == "null" ]] && echo "Failed to retrieve OpenWrt rootfs download URL." && exit 1
          latest_url="$(echo ${latest_version} | jq -r '.url')"
          rootfsfile_name="${latest_url##*/}"
          echo "Latest rootfs file found: ${rootfsfile_name}"

          # Download the rootfs file
          download_path="download"
          [[ -d "${download_path}" ]] || mkdir -p ${download_path}
          curl -fsSL "${latest_url}" -o "${download_path}/${rootfsfile_name}"
          [[ "${?}" -ne "0" ]] && echo "Failed to download OpenWrt rootfs file." && exit 1

          # Set up builder directory and symlinks
          mkdir -p opt
          sudo rm -rf /opt && sudo ln -sf /builder/opt /opt
          ln -sf /builder/${download_path} ${{ github.workspace }}/${download_path}

          echo "build_tag=OpenWrt_armv8_${{ inputs.openwrt_storage }}_$(date +"%Y.%m")" >> ${GITHUB_ENV}
          echo "status=success" >> ${GITHUB_OUTPUT}

      - name: Slim down rootfs (Remove Docker/iStore/WiFi)
        if: ${{ steps.download.outputs.status == 'success' && !cancelled() }}
        run: |
          mkdir -p /builder/tmp_rootfs
          # 自动获取下载好的 rootfs 文件名并解压
          ROOTFS_TAR=$(ls /builder/download/*rootfs.tar.gz)
          sudo tar -zxf $ROOTFS_TAR -C /builder/tmp_rootfs
          
          echo "Starting slimming process..."
          # 1. 移除 WiFi 驱动及固件
          sudo rm -rf /builder/tmp_rootfs/lib/modules/*/kernel/drivers/net/wireless/broadcom/brcm80211/brcmfmac/ 2>/dev/null
          sudo rm -rf /builder/tmp_rootfs/lib/firmware/brcm/ 2>/dev/null
          
          # 2. 移除 Docker (解决高负载)
          sudo rm -rf /builder/tmp_rootfs/etc/docker/ /builder/tmp_rootfs/usr/lib/docker/ 2>/dev/null
          sudo rm -f /builder/tmp_rootfs/usr/bin/docker* /builder/tmp_rootfs/etc/init.d/docker 2>/dev/null
          sudo rm -f /builder/tmp_rootfs/usr/lib/lua/luci/controller/docker.lua 2>/dev/null
          
          # 3. 移除 iStore
          sudo rm -rf /builder/tmp_rootfs/usr/lib/lua/luci/controller/istore.lua /builder/tmp_rootfs/www/istore/ 2>/dev/null
          
          # 4. 重新打包覆盖原文件
          cd /builder/tmp_rootfs
          sudo tar -zcf $ROOTFS_TAR .
          sudo rm -rf /builder/tmp_rootfs
          echo "Slimming completed."
          
      - name: Package OpenWrt Firmware
        uses: unifreq/openwrt_packit@master
        if: ${{ steps.download.outputs.status == 'success' && !cancelled() }}
        env:
          OPENWRT_ARMSR: download/*rootfs.tar.gz
          PACKAGE_SOC: ${{ inputs.openwrt_soc }}
          KERNEL_REPO_URL: ${{ inputs.kernel_repo }}
          KERNEL_VERSION_NAME: ${{ inputs.openwrt_kernel }}
          KERNEL_AUTO_LATEST: ${{ inputs.auto_kernel }}
          OPENWRT_IP: ${{ inputs.openwrt_ip }}
          CUSTOMIZE_RK3399: ${{ inputs.customize_rk3399 }}
          SCRIPT_DIY_PATH: ${{ inputs.script_diy_path }}
          WHOAMI: ${{ inputs.builder_name }}

      - name: Upload OpenWrt Firmware to Release
        uses: ncipollo/release-action@main
        if: ${{ env.PACKAGED_STATUS == 'success' && !cancelled() }}
        with:
          tag: ${{ env.build_tag }}
          artifacts: ${{ env.PACKAGED_OUTPUTPATH }}/*
          allowUpdates: true
          removeArtifacts: false
          replacesArtifacts: true
          makeLatest: true
          token: ${{ secrets.GITHUB_TOKEN }}
          body: |
            ### OpenWrt Image information
            - Default IP: 192.168.1.2
            - Default username: root
            - Default password: password
            ### Install to EMMC
            - Login to OpenWrt → System → Amlogic Service → Install OpenWrt
            ### OpenWrt source code
            - [coolsnowwolf/lede](https://github.com/coolsnowwolf/lede)
            - The OpenWrt [rootfs and kernel](https://github.com/ophub/flippy-openwrt-actions/releases/tag/OpenWrt_armv8_rootfs) files are both shared by [flippy](https://github.com/unifreq/openwrt_packit).
            ### OpenWrt Image Verification
            - sha256sum
